{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arya OS</title>
  <link rel="stylesheet" href="{% static 'desktop/css/style.css' %}?v=17">
  <script defer src="{% static 'desktop/js/os.js' %}?v=17"></script>
</head>
<body>

<!-- ① Full-screen kernel boot overlay ─────────────── -->
<div id="boot-screen">
  <div id="boot-content">
    <div id="boot-title">[ ARYA_OS ]  KERNEL BOOT SEQUENCE  v1.2.0</div>
    <div id="boot-sep">──────────────────────────────────────────────</div>
    <div id="boot-log"></div>
    <div id="boot-prompt"><span class="boot-cursor">▌</span></div>
  </div>
</div>

<!-- Mobile status bar (hidden on desktop) ──────────── -->
<div id="mobile-status-bar">
  <span id="mobile-time"></span>
</div>

<!-- Desktop icons ───────────────────────────────────── -->
<div id="desktop">

  <div class="icon" data-app="about" onclick="openApp('about')">
    <div class="folder" style="--folder-color:#8B5CF6;--folder-back-color:#6D28D9;">
      <div class="folder__back">
        <div class="paper paper-1"></div>
        <div class="paper paper-2"></div>
        <div class="paper paper-3"></div>
        <div class="folder__front"></div>
        <div class="folder__front right"></div>
      </div>
    </div>
    <span>About</span>
  </div>

  <div class="icon" data-app="projects" onclick="openApp('projects')">
    <div class="folder" style="--folder-color:#3B82F6;--folder-back-color:#1D4ED8;">
      <div class="folder__back">
        <div class="paper paper-1"></div>
        <div class="paper paper-2"></div>
        <div class="paper paper-3"></div>
        <div class="folder__front"></div>
        <div class="folder__front right"></div>
      </div>
    </div>
    <span>Projects</span>
  </div>

  <div class="icon" data-app="skills" onclick="openApp('skills')">
    <div class="folder" style="--folder-color:#10B981;--folder-back-color:#047857;">
      <div class="folder__back">
        <div class="paper paper-1"></div>
        <div class="paper paper-2"></div>
        <div class="paper paper-3"></div>
        <div class="folder__front"></div>
        <div class="folder__front right"></div>
      </div>
    </div>
    <span>Skills</span>
  </div>

  <div class="icon" data-app="ai" onclick="openApp('ai')">
    <div class="folder" style="--folder-color:#F59E0B;--folder-back-color:#B45309;">
      <div class="folder__back">
        <div class="paper paper-1"></div>
        <div class="paper paper-2"></div>
        <div class="paper paper-3"></div>
        <div class="folder__front"></div>
        <div class="folder__front right"></div>
      </div>
    </div>
    <span>Assistant</span>
  </div>

  <div class="icon" data-app="terminal" onclick="openApp('terminal')">
    <div class="folder" style="--folder-color:#6B7280;--folder-back-color:#374151;">
      <div class="folder__back">
        <div class="paper paper-1"></div>
        <div class="paper paper-2"></div>
        <div class="paper paper-3"></div>
        <div class="folder__front"></div>
        <div class="folder__front right"></div>
      </div>
    </div>
    <span>Terminal</span>
  </div>

  <div class="icon" data-app="files" onclick="openApp('files')">
    <div class="folder" style="--folder-color:#F97316;--folder-back-color:#C2410C;">
      <div class="folder__back">
        <div class="paper paper-1"></div>
        <div class="paper paper-2"></div>
        <div class="paper paper-3"></div>
        <div class="folder__front"></div>
        <div class="folder__front right"></div>
      </div>
    </div>
    <span>Files</span>
  </div>

</div>

<!-- Dock — data-app powers minimize-to-dock & previews -->
<div id="dock">
  <div class="dock-icon" data-app="about"    onclick="openApp('about')">📄</div>
  <div class="dock-icon" data-app="projects" onclick="openApp('projects')">📁</div>
  <div class="dock-icon" data-app="skills"   onclick="openApp('skills')">🛠</div>
  <div class="dock-icon" data-app="ai"       onclick="openApp('ai')">🤖</div>
  <div class="dock-icon" data-app="terminal" onclick="openApp('terminal')">💻</div>
  <div class="dock-icon" data-app="files"    onclick="openApp('files')">📂</div>
</div>

<!-- Background hero ─────────────────────────────────── -->
<div id="bg-hero">
  <div id="bg-hero-content">

    <!-- Left: avatar + text -->
    <div id="bg-hero-left">
      <svg id="bg-avatar" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="100%" stop-color="#764ba2"/>
          </linearGradient>
          <clipPath id="bgc"><circle cx="50" cy="50" r="49"/></clipPath>
        </defs>
        <circle cx="50" cy="50" r="50" fill="url(#bgg)"/>
        <g clip-path="url(#bgc)">
          <rect x="8" y="76" width="84" height="32" fill="#4a7fd4"/>
          <line x1="8" y1="82" x2="92" y2="82" stroke="white" stroke-width="0.9" opacity="0.45"/>
          <line x1="8" y1="90" x2="92" y2="90" stroke="white" stroke-width="0.9" opacity="0.45"/>
          <line x1="28" y1="76" x2="28" y2="108" stroke="white" stroke-width="0.9" opacity="0.45"/>
          <line x1="50" y1="76" x2="50" y2="108" stroke="white" stroke-width="0.9" opacity="0.45"/>
          <line x1="72" y1="76" x2="72" y2="108" stroke="white" stroke-width="0.9" opacity="0.45"/>
          <path d="M41,76 L50,87 L59,76" fill="#2d5ab8"/>
          <rect x="42" y="64" width="16" height="16" fill="#c8845a"/>
          <ellipse cx="29" cy="52" rx="4" ry="6" fill="#b8724a"/>
          <ellipse cx="71" cy="52" rx="4" ry="6" fill="#b8724a"/>
          <ellipse cx="50" cy="52" rx="21" ry="24" fill="#c8845a"/>
          <ellipse cx="50" cy="30" rx="21" ry="13" fill="#1a0f08"/>
          <rect x="29" y="30" width="42" height="13" fill="#1a0f08"/>
          <ellipse cx="30" cy="42" rx="4" ry="8" fill="#1a0f08"/>
          <ellipse cx="70" cy="42" rx="4" ry="8" fill="#1a0f08"/>
          <path d="M36,43 Q42,40 48,42" stroke="#1a0f08" stroke-width="2.4" fill="none" stroke-linecap="round"/>
          <path d="M52,42 Q58,40 64,43" stroke="#1a0f08" stroke-width="2.4" fill="none" stroke-linecap="round"/>
          <ellipse cx="41" cy="50" rx="5" ry="5.2" fill="white"/>
          <ellipse cx="59" cy="50" rx="5" ry="5.2" fill="white"/>
          <circle cx="41" cy="51" r="3.4" fill="#2c1810"/>
          <circle cx="59" cy="51" r="3.4" fill="#2c1810"/>
          <circle cx="42" cy="50" r="1.2" fill="white"/>
          <circle cx="60" cy="50" r="1.2" fill="white"/>
          <circle cx="46" cy="59" r="2.2" fill="#b07040" opacity="0.7"/>
          <circle cx="54" cy="59" r="2.2" fill="#b07040" opacity="0.7"/>
          <path d="M47,57 Q50,61 53,57" stroke="#a06040" stroke-width="1.4" fill="none"/>
          <path d="M44,64 Q47,67 50,65 Q53,67 56,64" stroke="#2c1810" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <path d="M44,68 Q50,73 56,68" stroke="#8b4513" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        </g>
      </svg>
      <div>
        <p class="bg-greeting">Hi there, I'm</p>
        <h1 class="bg-name">Arya Kaushal</h1>
        <p class="bg-role">Backend · AI · DevOps Engineer</p>
      </div>
    </div>

    <!-- Right: icon cloud -->
    <canvas id="icon-cloud-canvas" width="300" height="300"></canvas>

  </div>
</div>

</body>
</html>
