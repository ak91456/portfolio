name: Deploy to Fly.io

on:
  push:
    branches:
      - main          # auto-deploy every time you push to main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        # --remote-only = Fly builds the Docker image on their servers,
        # not in GitHub Actions (faster, no Docker-in-Docker needed)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
